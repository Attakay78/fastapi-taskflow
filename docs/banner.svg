<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 100" width="560" height="100">
  <!-- Logo icon box — white box with teal icon -->
  <rect x="16" y="10" width="80" height="80" rx="16" ry="16" fill="#ffffff"/>

  <!-- Activity polyline scaled to 80x80 box -->
  <polyline
    points="24,50 38,50 48,68 64,32 74,50 88,50"
    fill="none"
    stroke="#009688"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Title: "FastAPI-TaskFlow" with teal accent on "FastAPI-" -->
  <text x="112" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="-1">
    <tspan fill="#009688">FastAPI-</tspan><tspan fill="#ffffff">TaskFlow</tspan>
  </text>
</svg>
